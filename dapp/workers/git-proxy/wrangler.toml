name = "git-proxy"
main = "src/index.ts"
compatibility_date = "2026-03-16"

[observability]
enabled = true

# Optional override for CORS allowlist.
# If omitted, the worker falls back to the defaults in src/gitProxy.ts.
# To override, uncomment and set a comma-separated list, for example:
# [vars]
# CORS_ALLOWED_ORIGINS = "http://localhost:4321,https://app.tansu.dev,https://testnet.tansu.dev"